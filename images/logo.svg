<svg viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
  <!-- Define colors -->
  <defs>
    <style>
      .logo-primary { fill: #a08080; }
      .logo-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- CROSS (Left side) -->
  <g>
    <!-- Vertical bar -->
    <rect x="35" y="20" width="20" height="80" class="logo-primary" rx="2"/>
    <!-- Horizontal bar -->
    <rect x="15" y="50" width="60" height="20" class="logo-primary" rx="2"/>
  </g>

  <!-- DOVE (Top center) with radiating lines -->
  <g>
    <!-- Radiating lines -->
    <line x1="150" y1="30" x2="150" y2="10" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    <line x1="170" y1="35" x2="185" y2="20" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    <line x1="180" y1="55" x2="200" y2="55" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    <line x1="170" y1="75" x2="185" y2="90" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    <line x1="130" y1="35" x2="115" y2="20" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    <line x1="120" y1="55" x2="100" y2="55" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    <line x1="130" y1="75" x2="115" y2="90" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Dove body -->
    <ellipse cx="150" cy="60" rx="18" ry="22" class="logo-primary"/>
    
    <!-- Dove head -->
    <circle cx="150" cy="35" r="12" class="logo-primary"/>
    
    <!-- Dove beak -->
    <polygon points="160,35 175,33 172,37" class="logo-primary"/>
    
    <!-- Left wing -->
    <path d="M 135 55 Q 115 45 115 65 Q 120 75 135 70" class="logo-primary" stroke="#a08080" stroke-width="1.5" fill="none"/>
    
    <!-- Right wing -->
    <path d="M 165 55 Q 185 45 185 65 Q 180 75 165 70" class="logo-primary" stroke="#a08080" stroke-width="1.5" fill="none"/>
  </g>

  <!-- CHURCH BUILDING (Bottom) -->
  <g>
    <!-- Main building body -->
    <rect x="80" y="120" width="140" height="90" class="logo-primary" rx="2"/>
    
    <!-- Left arch -->
    <path d="M 100 150 Q 100 130 115 130 Q 115 150 115 170" fill="white" stroke="#a08080" stroke-width="2"/>
    <ellipse cx="107.5" cy="130" rx="7.5" ry="8" fill="white"/>
    
    <!-- Center arch -->
    <path d="M 140 150 Q 140 130 155 130 Q 155 150 155 170" fill="white" stroke="#a08080" stroke-width="2"/>
    <ellipse cx="147.5" cy="130" rx="7.5" ry="8" fill="white"/>
    
    <!-- Right arch -->
    <path d="M 180 150 Q 180 130 195 130 Q 195 150 195 170" fill="white" stroke="#a08080" stroke-width="2"/>
    <ellipse cx="187.5" cy="130" rx="7.5" ry="8" fill="white"/>
    
    <!-- Left bell tower -->
    <rect x="65" y="100" width="25" height="60" class="logo-primary" rx="1"/>
    <rect x="68" y="95" width="19" height="10" class="logo-primary"/>
    
    <!-- Cross on tower -->
    <line x1="77.5" y1="85" x2="77.5" y2="102" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="92.5" x2="85" y2="92.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- MAIN TEXT -->
  <text x="150" y="250" text-anchor="middle" font-size="42" font-weight="700" class="logo-primary logo-text">
    ST. STEPHEN
  </text>

  <!-- TAGLINE -->
  <text x="150" y="280" text-anchor="middle" font-size="18" font-weight="600" letter-spacing="3" class="logo-primary logo-text">
    FAITH, LOVE AND TRUTH
  </text>

  <!-- Decorative line -->
  <line x1="60" y1="295" x2="240" y2="295" stroke="#a08080" stroke-width="2" stroke-linecap="round"/>
</svg>
